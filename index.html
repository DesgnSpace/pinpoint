<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinpoint - Get Exact Image Coordinates & Position Tool</title>
  <meta name="description" content="Free online tool to get exact pixel coordinates and percentage positions from any image. Click anywhere on your image to get X, Y positions, percentages, and view image metadata.">
  <meta name="keywords" content="image coordinates, pixel position, image position tool, get coordinates from image, image metadata, EXIF data, click coordinates">
  <meta name="author" content="DesgnSpace">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Pinpoint - Get Exact Image Coordinates & Position Tool">
  <meta property="og:description" content="Free online tool to get exact pixel coordinates and percentage positions from any image. View image metadata and EXIF data.">
  <meta property="og:site_name" content="DesgnSpace">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Pinpoint - Get Exact Image Coordinates & Position Tool">
  <meta name="twitter:description" content="Free online tool to get exact pixel coordinates and percentage positions from any image.">

  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#1a1c21">

  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <style>
        :root {
      --bg-main: #0d0d0f;
      --bg-surface: #141417;
      --bg-hover: #1e1e21;
      --border-subtle: #2a2a2d;
      --border-strong: #e8e6e3;
      --text-main: #e8e6e3;
      --text-muted: #8b8a88;
      --accent: #e8e6e3;
      --accent-hover: #c8c4be;

      --sidebar-bg: #0d0d0f;
      --sidebar-text: #e8e6e3;
      --sidebar-muted: #8b8a88;
      --sidebar-faint: #6b6a68;
      --sidebar-border: #2a2a2d;
      --sidebar-hover: #1e1e21;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Mono', 'Segoe UI Mono', 'Roboto Mono', Menlo, monospace;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      font-size: 13px;
      line-height: 1.5;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .sidebar {
      width: 340px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--sidebar-border);
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      max-height: 100vh;
      color: var(--sidebar-text);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--sidebar-border);
      margin-bottom: 24px;
    }

    .sidebar-crosshair {
      width: 14px;
      height: 14px;
      position: relative;
      flex-shrink: 0;
    }

    .sidebar-crosshair::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 1px;
      background: var(--sidebar-muted);
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .sidebar-crosshair::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 100%;
      background: var(--sidebar-muted);
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .sidebar-header-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sidebar-header-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--sidebar-text);
    }

    .sidebar-header-sub {
      font-size: 10px;
      color: var(--sidebar-faint);
    }

    .coordinate-hero {
      display: none;
      padding: 16px 0 20px;
      border-bottom: 1px solid var(--sidebar-border);
      margin-bottom: 20px;
    }

    .coordinate-hero.visible {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .coordinate-hero-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .coordinate-hero-label {
      font-size: 11px;
      color: var(--sidebar-faint);
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .coordinate-hero-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--sidebar-text);
      font-variant-numeric: tabular-nums;
    }

    .coordinate-hero-value.pct {
      color: var(--sidebar-muted);
    }

    .sidebar h2 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--sidebar-faint);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sidebar-border);
    }

    .info-section {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 24px;
    }

    .info-section:last-of-type {
      margin-bottom: 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 8px;
      margin: 0 -8px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s cubic-bezier(0.25, 1, 0.5, 1);
      border-radius: 4px;
    }

    .info-row:hover {
      background: var(--sidebar-hover);
    }
    
    .info-row:hover .info-value {
      color: var(--sidebar-text);
    }

    .info-row:focus-visible {
      outline: 2px solid var(--sidebar-text);
      outline-offset: -2px;
    }

    .copy-feedback {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--sidebar-text);
      color: var(--sidebar-bg);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .copy-feedback.visible {
      opacity: 1;
    }

    .info-label {
      font-size: 12px;
      color: var(--sidebar-faint);
      letter-spacing: 0.2px;
    }

    .info-value {
      font-size: 12px;
      font-weight: 500;
      color: var(--sidebar-muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
      word-break: break-all;
      margin-left: 16px;
      transition: color 0.15s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .info-value.highlight {
      color: var(--sidebar-text);
      font-weight: 600;
    }

    .empty-state {
      color: var(--sidebar-faint);
      font-size: 12px;
      padding: 6px 8px;
      margin: 0 -8px;
    }

    .sidebar-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 20px;
      border-top: 1px solid var(--sidebar-border);
    }

    .branding {
      font-size: 10px;
      color: var(--sidebar-faint);
      text-align: right;
      letter-spacing: 0.3px;
    }

    .branding a {
      color: var(--sidebar-muted);
      text-decoration: none;
      font-weight: 500;
    }

    .branding a:hover {
      color: var(--sidebar-text);
    }

    .reset-btn {
      background: transparent;
      color: var(--sidebar-text);
      border: 1px solid var(--sidebar-border);
      width: 100%;
      padding: 10px 24px;
    }

    .reset-btn:hover {
      background: var(--sidebar-bg);
      border-color: var(--sidebar-text);
    }

    .drop-zone {
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      padding: 64px 24px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      background: var(--bg-surface);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .drop-zone-text {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .drop-zone-text strong {
      color: var(--text-main);
      text-decoration: underline;
      cursor: pointer;
    }

    .url-input-wrapper {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      overflow: hidden;
    }

    .url-input {
      flex: 1;
      padding: 12px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      background: transparent;
    }

    .url-input:focus {
      background: var(--bg-hover);
    }

    .url-input:focus-visible {
      outline: none;
    }

    .btn {
      padding: 12px 24px;
      background: var(--accent);
      color: var(--bg-main);
      border: 1px solid var(--accent);
      border-radius: 0;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.2s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .btn:hover {
      background: var(--bg-main);
      color: var(--accent);
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .url-input-wrapper .btn {
      border: none;
      border-left: 1px solid var(--border-subtle);
      border-radius: 0;
    }

    .image-container {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-hover);
      border-radius: 4px;
      overflow: hidden;
      padding: 24px;
    }

    .image-container.visible {
      display: flex;
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      cursor: crosshair;
      max-width: 100%;
    }

    .image-wrapper img {
      display: block;
      max-height: calc(100vh - 100px);
      max-width: 100%;
      width: auto;
      height: auto;
    }

    .marker {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 1.5px solid white;
      border-radius: 50%;
      background: transparent;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.12);
    }
    
    .marker::before, .marker::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      background: white;
      transform: translate(-50%, -50%);
    }
    
    .marker::before { width: 100%; height: 1px; }
    .marker::after { width: 1px; height: 100%; }

    input[type="file"] {
      display: none;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    @media (max-width: 720px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        max-height: none;
        border-left: none;
        border-top: 1px solid var(--sidebar-border);
        padding: 20px 16px 16px;
      }

      .main-area {
        padding: 16px;
        min-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <main class="main-area">
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-text">
        Drag and drop an image here<br>
        or <strong id="browseBtn">browse files</strong><br>
        or paste from clipboard (Ctrl+V)
      </div>
      <div class="url-input-wrapper">
        <input type="text" class="url-input" id="urlInput" placeholder="Or enter image URL...">
        <button class="btn" id="loadUrlBtn">Load</button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="image-container" id="imageContainer">
      <div class="image-wrapper" id="imageWrapper">
        <img id="mainImage" src="" alt="Loaded image">
        <div class="marker" id="marker" style="display: none;"></div>
      </div>
    </div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-crosshair"></div>
      <div class="sidebar-header-text">
        <span class="sidebar-header-label">Pinpoint</span>
        <span class="sidebar-header-sub">Coordinate Inspector</span>
      </div>
    </div>

    <div class="coordinate-hero" id="coordinateHero">
      <div class="coordinate-hero-row">
        <span class="coordinate-hero-label">X</span>
        <span class="coordinate-hero-value" id="heroX">—</span>
      </div>
      <div class="coordinate-hero-row">
        <span class="coordinate-hero-label">Y</span>
        <span class="coordinate-hero-value" id="heroY">—</span>
      </div>
      <div class="coordinate-hero-row">
        <span class="coordinate-hero-label">%</span>
        <span class="coordinate-hero-value pct" id="heroPct">—</span>
      </div>
    </div>

    <section class="info-section">
      <h2>Image</h2>
      <div id="imageInfo">
        <p class="empty-state">No image loaded</p>
      </div>
    </section>

    <section class="info-section">
      <h2>Position</h2>
      <div id="positionInfo">
        <p class="empty-state">Click on image to get position</p>
      </div>
    </section>

    <section class="info-section">
      <h2>Metadata</h2>
      <div id="metadataInfo">
        <p class="empty-state">No image loaded</p>
      </div>
    </section>

    <div class="sidebar-footer">
      <button class="btn reset-btn" id="resetBtn" style="display: none;">Load New Image</button>
      <div class="branding">
        pinpoint by <a href="https://desgn.space" target="_blank">desgn.space</a>
      </div>
    </div>
  </aside>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');
    const urlInput = document.getElementById('urlInput');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const imageContainer = document.getElementById('imageContainer');
    const imageWrapper = document.getElementById('imageWrapper');
    const mainImage = document.getElementById('mainImage');
    const marker = document.getElementById('marker');
    const imageInfo = document.getElementById('imageInfo');
    const positionInfo = document.getElementById('positionInfo');
    const metadataInfo = document.getElementById('metadataInfo');
    const resetBtn = document.getElementById('resetBtn');
    const sidebar = document.querySelector('.sidebar');
    const coordinateHero = document.getElementById('coordinateHero');
    const heroX = document.getElementById('heroX');
    const heroY = document.getElementById('heroY');
    const heroPct = document.getElementById('heroPct');

    function copyRowValue(row) {
      const valueEl = row.querySelector('.info-value');
      if (!valueEl) return;

      const text = valueEl.innerText;

      navigator.clipboard.writeText(text).then(() => {
        let feedback = row.querySelector('.copy-feedback');
        if (!feedback) {
          feedback = document.createElement('span');
          feedback.className = 'copy-feedback';
          feedback.innerText = 'COPIED';
          row.appendChild(feedback);
        }

        void feedback.offsetWidth;
        feedback.classList.add('visible');

        setTimeout(() => {
          feedback.classList.remove('visible');
          setTimeout(() => {
            if (feedback.parentNode === row) {
              row.removeChild(feedback);
            }
          }, 200);
        }, 1000);
      }).catch(() => {});
    }

    sidebar.addEventListener('click', (e) => {
      const row = e.target.closest('.info-row');
      if (!row) return;
      copyRowValue(row);
    });

    sidebar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const row = e.target.closest('.info-row');
        if (!row) return;
        e.preventDefault();
        copyRowValue(row);
      }
    });

    let imageNaturalWidth = 0;
    let imageNaturalHeight = 0;
    let currentFile = null;

    browseBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      fileInput.click();
    });

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        loadImageFromFile(file);
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        loadImageFromFile(file);
      }
    });

    urlInput.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    loadUrlBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const url = urlInput.value.trim();
      if (url) {
        loadImageFromUrl(url);
      }
    });

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const url = urlInput.value.trim();
        if (url) {
          loadImageFromUrl(url);
        }
      }
    });

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData.items;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          loadImageFromFile(file);
          return;
        }
      }

      const text = e.clipboardData.getData('text');
      if (text && (text.startsWith('http://') || text.startsWith('https://'))) {
        loadImageFromUrl(text);
      }
    });

    function loadImageFromFile(file) {
      currentFile = file;
      const reader = new FileReader();
      reader.onload = (e) => displayImage(e.target.result, file);
      reader.readAsDataURL(file);
    }

    function loadImageFromUrl(url) {
      currentFile = null;
      displayImage(url, null);
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatExifDate(exifDate) {
      if (!exifDate) return null;
      const parts = exifDate.split(' ');
      if (parts.length < 2) return exifDate;
      const dateParts = parts[0].split(':');
      if (dateParts.length !== 3) return exifDate;
      const date = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function extractMetadata(file, img) {
      let metadataHtml = '';

      if (file) {
        metadataHtml += `
          <div class="info-row" tabindex="0" role="button">
            <span class="info-label">File Name</span>
            <span class="info-value">${file.name}</span>
          </div>
          <div class="info-row" tabindex="0" role="button">
            <span class="info-label">File Size</span>
            <span class="info-value">${formatFileSize(file.size)}</span>
          </div>
          <div class="info-row" tabindex="0" role="button">
            <span class="info-label">File Type</span>
            <span class="info-value">${file.type || 'Unknown'}</span>
          </div>
        `;

        if (file.lastModified) {
          const modDate = new Date(file.lastModified);
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">Last Modified</span>
              <span class="info-value">${modDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
            </div>
          `;
        }
      }

      EXIF.getData(img, function() {
        const make = EXIF.getTag(this, 'Make');
        const model = EXIF.getTag(this, 'Model');
        const dateOriginal = EXIF.getTag(this, 'DateTimeOriginal');
        const fNumber = EXIF.getTag(this, 'FNumber');
        const exposureTime = EXIF.getTag(this, 'ExposureTime');
        const iso = EXIF.getTag(this, 'ISOSpeedRatings');
        const focalLength = EXIF.getTag(this, 'FocalLength');

        if (dateOriginal) {
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">Date Taken</span>
              <span class="info-value">${formatExifDate(dateOriginal)}</span>
            </div>
          `;
        }

        if (make || model) {
          const camera = [make, model].filter(Boolean).join(' ');
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">Camera</span>
              <span class="info-value">${camera}</span>
            </div>
          `;
        }

        if (fNumber) {
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">Aperture</span>
              <span class="info-value">f/${fNumber}</span>
            </div>
          `;
        }

        if (exposureTime) {
          const exposure = exposureTime < 1 ? `1/${Math.round(1/exposureTime)}s` : `${exposureTime}s`;
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">Exposure</span>
              <span class="info-value">${exposure}</span>
            </div>
          `;
        }

        if (iso) {
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">ISO</span>
              <span class="info-value">${iso}</span>
            </div>
          `;
        }

        if (focalLength) {
          metadataHtml += `
            <div class="info-row" tabindex="0" role="button">
              <span class="info-label">Focal Length</span>
              <span class="info-value">${focalLength}mm</span>
            </div>
          `;
        }

        metadataInfo.innerHTML = metadataHtml || '<p class="empty-state">No metadata available</p>';
      });

      if (!file && metadataHtml === '') {
        metadataInfo.innerHTML = '<p class="empty-state">No metadata available</p>';
      } else if (metadataHtml) {
        metadataInfo.innerHTML = metadataHtml;
      }
    }

    function displayImage(src, file) {
      mainImage.src = src;
      mainImage.onload = () => {
        imageNaturalWidth = mainImage.naturalWidth;
        imageNaturalHeight = mainImage.naturalHeight;

        dropZone.style.display = 'none';
        imageContainer.classList.add('visible');
        resetBtn.style.display = 'block';
        marker.style.display = 'none';
        coordinateHero.classList.add('visible');
        heroX.textContent = '—';
        heroY.textContent = '—';
        heroPct.textContent = '—';

        const aspectRatio = (imageNaturalWidth / imageNaturalHeight).toFixed(2);

        imageInfo.innerHTML = `
          <div class="info-row" tabindex="0" role="button">
            <span class="info-label">Width</span>
            <span class="info-value">${imageNaturalWidth}px</span>
          </div>
          <div class="info-row" tabindex="0" role="button">
            <span class="info-label">Height</span>
            <span class="info-value">${imageNaturalHeight}px</span>
          </div>
          <div class="info-row" tabindex="0" role="button">
            <span class="info-label">Aspect Ratio</span>
            <span class="info-value">${aspectRatio}</span>
          </div>
        `;

        positionInfo.innerHTML = '<p class="empty-state">Click on image to get position</p>';
        extractMetadata(file, mainImage);
      };

      mainImage.onerror = () => {
        alert('Failed to load image. Please check the URL or try another image.');
      };
    }

    mainImage.addEventListener('click', (e) => {
      const imageRect = mainImage.getBoundingClientRect();
      const wrapperRect = imageWrapper.getBoundingClientRect();

      const clickX = e.clientX - imageRect.left;
      const clickY = e.clientY - imageRect.top;

      const displayedWidth = mainImage.offsetWidth;
      const displayedHeight = mainImage.offsetHeight;

      const scaleX = imageNaturalWidth / displayedWidth;
      const scaleY = imageNaturalHeight / displayedHeight;

      const actualX = Math.round(clickX * scaleX);
      const actualY = Math.round(clickY * scaleY);

      const percentX = ((actualX / imageNaturalWidth) * 100).toFixed(2);
      const percentY = ((actualY / imageNaturalHeight) * 100).toFixed(2);

      const markerX = clickX + (imageRect.left - wrapperRect.left);
      const markerY = clickY + (imageRect.top - wrapperRect.top);

      marker.style.display = 'block';
      marker.style.left = `${markerX}px`;
      marker.style.top = `${markerY}px`;

      heroX.textContent = `${actualX}px`;
      heroY.textContent = `${actualY}px`;
      heroPct.textContent = `${percentX}% × ${percentY}%`;

      positionInfo.innerHTML = `
        <div class="info-row" tabindex="0" role="button">
          <span class="info-label">X Position</span>
          <span class="info-value">${actualX}px</span>
        </div>
        <div class="info-row" tabindex="0" role="button">
          <span class="info-label">Y Position</span>
          <span class="info-value">${actualY}px</span>
        </div>
        <div class="info-row" tabindex="0" role="button">
          <span class="info-label">X Percent</span>
          <span class="info-value highlight">${percentX}%</span>
        </div>
        <div class="info-row" tabindex="0" role="button">
          <span class="info-label">Y Percent</span>
          <span class="info-value highlight">${percentY}%</span>
        </div>
      `;
    });

    resetBtn.addEventListener('click', () => {
      // Clear handlers to prevent errors when clearing src
      mainImage.onload = null;
      mainImage.onerror = null;
      
      dropZone.style.display = '';
      imageContainer.classList.remove('visible');
      resetBtn.style.display = 'none';
      mainImage.src = '';
      mainImage.removeAttribute('src');
      
      coordinateHero.classList.remove('visible');

      urlInput.value = '';
      fileInput.value = '';
      currentFile = null;
      imageInfo.innerHTML = '<p class="empty-state">No image loaded</p>';
      positionInfo.innerHTML = '<p class="empty-state">Click on image to get position</p>';
      metadataInfo.innerHTML = '<p class="empty-state">No image loaded</p>';
    });
  </script>
</body>
</html>
